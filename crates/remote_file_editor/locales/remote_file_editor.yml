      en: Choose Save to upload the latest changes before closing.
      zh-CN: 选择“保存”可在关闭前上传最新更改。
      zh-HK: 選擇「儲存」可在關閉前上傳最新更改。
  notification:
    saved:
      en: Remote file saved
      zh-CN: 远程文件已保存
      zh-HK: 遠端檔案已儲存
  body:
    loading:
      en: Loading remote file...
      zh-CN: 正在加载远程文件...
      zh-HK: 正在載入遠端檔案...
    unable_to_open:
      en: Unable to open file
      zh-CN: 无法打开文件
      zh-HK: 無法打開檔案
